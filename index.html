<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ SPIN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0057D8;
  --blue-dark: #003B8E;
  --blue-light: #4A9FFF;
  --gold: #FFD700;
  --bg: #000B1E;
  --card: #001535;
  --border: rgba(74,159,255,0.22);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--text);
  padding: 20px 16px;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse at 50% 35%, rgba(0,87,216,0.1) 0%, transparent 65%);
  pointer-events:none;
}

/* ── 外層左右排版 ── */
.layout {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  max-width: 860px;
}

/* ── 左欄：主遊戲區 ── */
.wrap {
  position: relative;
  width: min(400px, 100%);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

/* ── 右欄：紀錄面板 ── */
.log-panel {
  width: 220px;
  flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 600px;
}
.log-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.log-title {
  font-size: 13px;
  letter-spacing: .1em;
  color: var(--blue-light);
  font-weight: 700;
}
.btn-reset {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid rgba(255,100,100,.4);
  border-radius: 8px;
  color: rgba(255,120,120,.8);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: .1em;
  cursor: pointer;
  transition: all .2s;
}
.btn-reset:hover {
  background: rgba(255,80,80,.1);
  border-color: rgba(255,100,100,.7);
  color: #ff8080;
}
.log-list {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.log-list::-webkit-scrollbar { width: 4px; }
.log-list::-webkit-scrollbar-track { background: transparent; }
.log-list::-webkit-scrollbar-thumb { background: rgba(74,159,255,.25); border-radius: 2px; }
.log-empty {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  padding: 20px 0;
}
.log-entry {
  background: rgba(0,0,0,.3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  animation: entryIn .25s ease;
}
@keyframes entryIn {
  from { opacity:0; transform: translateY(-6px); }
  to   { opacity:1; transform: translateY(0); }
}
.log-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--blue-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.log-imgs {
  display: flex;
  gap: 4px;
}
.log-img {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  background: #000A1C;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  border: 1px solid var(--border);
}

/* ── HEADER ── */
.header { text-align:center; }
.header-sub { font-size:11px; letter-spacing:.45em; color:var(--blue-light); opacity:.65; }
.header-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:52px; letter-spacing:.1em; line-height:1;
  text-shadow: 0 0 28px rgba(74,159,255,.35);
}
.header-title span { color: var(--gold); }

/* ── SET SELECTOR ── */
.set-selector { display:flex; gap:8px; width:100%; }
.set-btn {
  flex:1;
  padding: 10px 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  cursor: pointer;
  font-family:'Noto Sans TC',sans-serif;
  font-size:12px;
  letter-spacing:.05em;
  transition: all .2s;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
}
.set-btn .set-icon { font-size:22px; }
.set-btn:hover { border-color: rgba(74,159,255,.4); color: rgba(255,255,255,.7); }
.set-btn.active {
  border-color: var(--blue-light);
  background: rgba(74,159,255,.1);
  color: var(--text);
  box-shadow: 0 0 14px rgba(74,159,255,.2);
}

/* ── MAIN CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px 20px;
  width:100%;
  box-shadow: 0 0 40px rgba(0,87,216,.12), inset 0 1px 0 rgba(74,159,255,.12);
  position:relative;
  overflow:hidden;
  min-height: 240px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap: 20px;
}

/* ── NAME INPUT ── */
.name-row {
  display: flex;
  gap: 0;
  width: 100%;
}
.name-input {
  flex: 1;
  padding: 12px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-right: none;
  border-radius: 12px 0 0 12px;
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.name-input::placeholder { color: var(--muted); }
.name-input:focus { border-color: rgba(74,159,255,.5); }

/* ── SPIN BUTTON ── */
.btn-spin {
  padding: 12px 20px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
  border: none;
  border-radius: 0 12px 12px 0;
  color: white;
  font-family:'Bebas Neue',sans-serif;
  font-size:20px; letter-spacing:.2em;
  cursor:pointer;
  transition:all .2s;
  box-shadow: 0 4px 18px rgba(0,87,216,.35);
  overflow:hidden; position:relative;
  white-space: nowrap;
}
.btn-spin::after {
  content:'';
  position:absolute;
  top:0; left:-100%; width:100%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  transition:left .5s;
}
.btn-spin:hover::after { left:100%; }
.btn-spin:hover { box-shadow:0 8px 24px rgba(0,87,216,.45); }
.btn-spin:disabled { opacity:.4; cursor:not-allowed; }

/* ── HINT ── */
.hint {
  font-size:12px; color:var(--muted);
  letter-spacing:.04em; text-align:center;
  min-height:18px; transition:color .3s;
}
.hint.ready { color:var(--blue-light); opacity:.9; }

.footer-note {
  font-size:10px; color:var(--muted); opacity:.45;
  letter-spacing:.2em; text-align:center;
}

/* ── STAGE A: BOX ── */
.stage-box { width:100%; display:flex; flex-direction:column; align-items:center; gap:16px; }
.box-container {
  position:relative; width:100px; height:90px;
  display:flex; align-items:flex-end; justify-content:center;
}
.box-img { font-size:70px; line-height:1; transform-origin:bottom center; display:block; transition:transform .1s; }
.box-container.shaking .box-img { animation: boxShake .08s ease-in-out infinite; }
@keyframes boxShake {
  0%   { transform: rotate(-6deg) translateX(-3px); }
  25%  { transform: rotate(6deg) translateX(3px); }
  50%  { transform: rotate(-5deg) translateX(-2px); }
  75%  { transform: rotate(5deg) translateX(2px); }
  100% { transform: rotate(0deg); }
}
.pop-items { position:absolute; top:0; left:50%; transform:translateX(-50%); width:200px; pointer-events:none; }
.pop-item {
  width:60px; height:60px; opacity:0; position:absolute; border-radius:8px;
  background-size:contain; background-position:center; background-repeat:no-repeat;
}
.pop-item.fly { animation: flyOut .55s cubic-bezier(.2,1.4,.4,1) forwards; }
@keyframes flyOut {
  0%   { opacity:0; transform: translate(0,30px) scale(0.3); }
  60%  { opacity:1; transform: translate(var(--tx), var(--ty)) scale(1.15); }
  100% { opacity:1; transform: translate(var(--tx), var(--ty)) scale(1); }
}
.box-result { display:flex; gap:10px; min-height:68px; align-items:center; justify-content:center; }
.box-result-item {
  width:68px; height:68px; background-color:#000A1C; border:1px solid var(--border); border-radius:12px;
  background-size:contain; background-position:center; background-repeat:no-repeat;
  opacity:0; transform:scale(0.5); transition:opacity .3s, transform .3s;
}
.box-result-item.show { opacity:1; transform:scale(1); }

/* ── STAGE B: BASKET ── */
.stage-basket { width:100%; display:flex; flex-direction:column; align-items:center; gap:16px; }
.basket-wrap {
  position:relative; width:120px; height:100px;
  display:flex; align-items:flex-end; justify-content:center;
}
.basket-img { font-size:72px; line-height:1; transform-origin:top center; display:block; }
.basket-wrap.swinging .basket-img { animation: basketSwing .35s ease-in-out; }
@keyframes basketSwing {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-18deg); }
  45%  { transform: rotate(16deg); }
  65%  { transform: rotate(-12deg); }
  80%  { transform: rotate(8deg); }
  100% { transform: rotate(0deg); }
}
.fruit-fall-container {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  width:160px; height:80px; pointer-events:none;
}
.fruit-fall {
  position:absolute; width:50px; height:50px; opacity:0; left:50%;
  background-size:contain; background-position:center; background-repeat:no-repeat;
}
.fruit-fall.drop { animation: fruitDrop .6s cubic-bezier(.4,0,.6,1) forwards; }
@keyframes fruitDrop {
  0%   { opacity:1; transform: translate(var(--fx), -10px) rotate(0deg); }
  100% { opacity:0; transform: translate(var(--fx), 80px) rotate(var(--fr)); }
}
.basket-result { display:flex; gap:10px; min-height:68px; align-items:center; justify-content:center; }
.basket-result-item {
  width:68px; height:68px; background-color:#000A1C; border:1px solid var(--border); border-radius:12px;
  background-size:contain; background-position:center; background-repeat:no-repeat;
  opacity:0; transform:translateY(-12px);
  transition:opacity .3s, transform .35s cubic-bezier(.34,1.56,.64,1);
}
.basket-result-item.show { opacity:1; transform:translateY(0); }

/* ── STAGE C: SLOTS ── */
.stage-slots { width:100%; display:flex; flex-direction:column; align-items:center; gap:16px; }
.slot-machine { background:#000510; border:2px solid rgba(74,159,255,.2); border-radius:14px; padding:6px; position:relative; }
.slot-machine::before, .slot-machine::after {
  content:''; position:absolute; left:6px; right:6px; height:40px; z-index:3; pointer-events:none;
}
.slot-machine::before { top:6px; background:linear-gradient(to bottom, #000510, transparent); }
.slot-machine::after  { bottom:6px; background:linear-gradient(to top, #000510, transparent); }
.reels { display:flex; gap:6px; height:220px; overflow:hidden; }
.reel { width:80px; overflow:hidden; border-radius:6px; position:relative; }
.reel-inner { display:flex; flex-direction:column; align-items:center; }
.reel-cell {
  width:80px; height:80px; flex-shrink:0; border-radius:6px;
  background-size:contain; background-position:center; background-repeat:no-repeat;
}
.reel-cell.center-win { animation: cellGlow .4s ease-in-out infinite alternate; }
@keyframes cellGlow {
  from { box-shadow: inset 0 0 0 0 rgba(255,215,0,0); }
  to   { box-shadow: inset 0 0 12px 2px rgba(255,215,0,.2); }
}
.win-line {
  position:absolute; left:6px; right:6px; top:50%; transform:translateY(-50%);
  height:82px; border-top:1px dashed rgba(255,215,0,.15); border-bottom:1px dashed rgba(255,215,0,.15);
  z-index:2; pointer-events:none; transition:border-color .3s;
}
.win-line.lit { border-color:rgba(255,215,0,.6); background:rgba(255,215,0,.03); }

/* ── 手機：改為上下排 ── */
@media (max-width: 680px) {
  body { align-items: flex-start; }
  .layout { flex-direction: column; align-items: center; }
  .log-panel { width: min(400px, 100%); max-height: 300px; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- 左欄：主遊戲區 -->
  <div class="wrap">

    <div class="header">
      <div class="header-sub">SUPER JUNIOR</div>
      <div class="header-title">SJ <span>SPIN</span></div>
    </div>

    <div class="set-selector">
      <button class="set-btn active" data-set="dango" onclick="switchSet('dango',this)">
        <span class="set-icon">&#128230;</span>
        <span>藍糰子</span>
      </button>
      <button class="set-btn" data-set="fruit" onclick="switchSet('fruit',this)">
        <span class="set-icon">&#129530;</span>
        <span>水果</span>
      </button>
      <button class="set-btn" data-set="animal" onclick="switchSet('animal',this)">
        <span class="set-icon">&#127920;</span>
        <span>動物</span>
      </button>
    </div>

    <div class="card" id="mainCard"></div>

    <div class="name-row">
      <input class="name-input" id="nameInput" type="text" placeholder="輸入你的名字…" maxlength="20">
      <button class="btn-spin" id="spinBtn">SPIN</button>
    </div>

    <div class="hint" id="hint">輸入名字，選一個主題，然後按 SPIN！</div>
    <div class="footer-note">E.L.F forever</div>

  </div>

  <!-- 右欄：紀錄面板 -->
  <div class="log-panel">
    <div class="log-header">
      <span class="log-title">搖骰紀錄</span>
      <button class="btn-reset" onclick="resetLog()">RESET</button>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty" id="logEmpty">尚無紀錄</div>
    </div>
  </div>

</div>

<script>
const SETS = {
  dango:  { symbols: ['01','02','03','04','05','06','07','08','09'], prefix: 'dango',  label: '藍糰子' },
  fruit:  { symbols: ['01','02','03','04','05','06','07','08','09'], prefix: 'fruit',  label: '水果'   },
  animal: { symbols: ['01','02','03','04','05','06','07','08','09'], prefix: 'animal', label: '動物'   }
};

let currentSet = 'dango';
let spinning = false;

function imgUrl(set, sym) {
  return 'images/' + SETS[set].prefix + '_' + sym + '.png';
}
function applyImg(el, set, sym) {
  el.style.backgroundImage = "url('" + imgUrl(set, sym) + "')";
}

function switchSet(key, btn) {
  if (spinning) return;
  currentSet = key;
  document.querySelectorAll('.set-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  loadLog();
renderStage();
  setHint('點 SPIN 開始！');
}

function renderStage() {
  var card = document.getElementById('mainCard');
  if (currentSet === 'dango')       card.innerHTML = buildBoxStage();
  else if (currentSet === 'fruit')  card.innerHTML = buildBasketStage();
  else                              card.innerHTML = buildSlotStage();
  if (currentSet === 'animal') initReels();
}

// ── STAGE A: BOX ──
function buildBoxStage() {
  return '<div class="stage-box"><div class="box-container" id="boxContainer"><span class="box-img">&#128230;</span><div class="pop-items" id="popItems"></div></div><div class="box-result"><div class="box-result-item" id="br0"></div><div class="box-result-item" id="br1"></div><div class="box-result-item" id="br2"></div></div></div>';
}

function runBoxSpin(results, cb) {
  var box = document.getElementById('boxContainer');
  var popItems = document.getElementById('popItems');
  var resultEls = [0,1,2].map(function(i) { return document.getElementById('br' + i); });

  resultEls.forEach(function(el) { el.style.backgroundImage = ''; el.classList.remove('show'); });
  box.classList.add('shaking');
  popItems.innerHTML = '';

  setTimeout(function() {
    box.classList.remove('shaking');
    results.forEach(function(sym, i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'pop-item';
        var tx = (i - 1) * 65 + 'px';
        el.style.cssText = '--tx:' + tx + ';--ty:-75px;left:calc(50% - 30px);';
        applyImg(el, currentSet, sym);
        popItems.appendChild(el);
        requestAnimationFrame(function() { requestAnimationFrame(function() { el.classList.add('fly'); }); });
        setTimeout(function() {
          el.style.opacity = '0';
          applyImg(resultEls[i], currentSet, sym);
          resultEls[i].classList.add('show');
          if (i === results.length - 1) setTimeout(cb, 200);
        }, 500);
      }, i * 200);
    });
  }, 2000);
}

// ── STAGE B: BASKET ──
function buildBasketStage() {
  return '<div class="stage-basket"><div class="basket-wrap" id="basketWrap"><span class="basket-img">&#129530;</span><div class="fruit-fall-container" id="fruitFall"></div></div><div class="basket-result"><div class="basket-result-item" id="ftr0"></div><div class="basket-result-item" id="ftr1"></div><div class="basket-result-item" id="ftr2"></div></div></div>';
}

function runBasketSpin(results, cb) {
  var wrap = document.getElementById('basketWrap');
  var fallContainer = document.getElementById('fruitFall');
  var resultEls = [0,1,2].map(function(i) { return document.getElementById('ftr' + i); });

  resultEls.forEach(function(el) { el.style.backgroundImage = ''; el.classList.remove('show'); });
  fallContainer.innerHTML = '';
  wrap.classList.add('swinging');
  setTimeout(function() { wrap.classList.remove('swinging'); }, 400);

  results.forEach(function(sym, i) {
    setTimeout(function() {
      var el = document.createElement('div');
      el.className = 'fruit-fall';
      var fx = (i - 1) * 50 + 'px';
      var fr = (Math.random() * 40 - 20) + 'deg';
      el.style.cssText = '--fx:' + fx + ';--fr:' + fr + ';';
      applyImg(el, currentSet, sym);
      fallContainer.appendChild(el);
      requestAnimationFrame(function() { requestAnimationFrame(function() { el.classList.add('drop'); }); });
      setTimeout(function() {
        applyImg(resultEls[i], currentSet, sym);
        resultEls[i].classList.add('show');
        if (i === results.length - 1) setTimeout(cb, 200);
      }, 500);
    }, 1450 + i * 180);
  });
}

// ── STAGE C: SLOTS ──
var REEL_CELL_H = 80;
var reelInners = [];

function buildSlotStage() {
  return '<div class="stage-slots"><div class="slot-machine"><div class="win-line" id="winLine"></div><div class="reels"><div class="reel"><div class="reel-inner" id="ri0"></div></div><div class="reel"><div class="reel-inner" id="ri1"></div></div><div class="reel"><div class="reel-inner" id="ri2"></div></div></div></div></div>';
}

function initReels() {
  var syms = SETS.animal.symbols;
  reelInners = [0,1,2].map(function(i) {
    var inner = document.getElementById('ri' + i);
    var strip = [];
    for (var j = 0; j < 24; j++) strip.push(syms[Math.floor(Math.random() * syms.length)]);
    inner.innerHTML = strip.map(function() { return '<div class="reel-cell"></div>'; }).join('');
    var cells = inner.querySelectorAll('.reel-cell');
    strip.forEach(function(sym, j) { applyImg(cells[j], 'animal', sym); });
    inner._strip = strip;
    inner._pos = 0;
    inner.style.transform = 'translateY(0px)';
    return inner;
  });
}

function runReelSpin(inner, targetSym, duration, cb) {
  var strip = inner._strip;
  var totalCells = strip.length;
  var landPos = inner._pos + 14 + Math.floor(Math.random() * 4);
  strip[(landPos + 1) % totalCells] = targetSym;
  var cells = inner.querySelectorAll('.reel-cell');
  cells.forEach(function(c, i) { applyImg(c, 'animal', strip[i % totalCells]); });

  var startPos = inner._pos;
  var startTime = performance.now();
  var totalDist = (landPos - startPos) * REEL_CELL_H;

  function tick(now) {
    var t = Math.min((now - startTime) / duration, 1);
    var eased = t < 0.65 ? t / 0.65 : 1 - Math.pow((t - 0.65) / 0.35, 2);
    inner.style.transform = 'translateY(' + (-(startPos * REEL_CELL_H + eased * totalDist)) + 'px)';
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      inner._pos = landPos % totalCells;
      inner.style.transform = 'translateY(-' + (inner._pos * REEL_CELL_H) + 'px)';
      if (cb) cb();
    }
  }
  requestAnimationFrame(tick);
}

// ── LOG ──
var LOG_KEY = 'sj-spin-log';

function saveLog(entries) {
  localStorage.setItem(LOG_KEY, JSON.stringify(entries));
}

function loadLog() {
  var entries = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
  if (entries.length === 0) return;
  var list = document.getElementById('logList');
  var empty = document.getElementById('logEmpty');
  if (empty) empty.remove();
  entries.forEach(function(e) {
    renderLogEntry(e.name, e.set, e.results, false);
  });
}

function renderLogEntry(name, set, results, prepend) {
  var list = document.getElementById('logList');
  var empty = document.getElementById('logEmpty');
  if (empty) empty.remove();

  var entry = document.createElement('div');
  entry.className = 'log-entry';

  var nameEl = document.createElement('div');
  nameEl.className = 'log-name';
  nameEl.textContent = name || '（匿名）';
  entry.appendChild(nameEl);

  var imgs = document.createElement('div');
  imgs.className = 'log-imgs';
  results.forEach(function(sym) {
    var img = document.createElement('div');
    img.className = 'log-img';
    applyImg(img, set, sym);
    imgs.appendChild(img);
  });
  entry.appendChild(imgs);

  if (prepend) list.insertBefore(entry, list.firstChild);
  else list.appendChild(entry);
}

function addLogEntry(name, set, results) {
  var entries = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
  entries.push({ name: name || '（匿名）', set: set, results: results });
  saveLog(entries);
  renderLogEntry(name, set, results, true);
}

function resetLog() {
  var pw = prompt('請輸入密碼：');
  if (pw === null) return;
  if (pw !== 'sjelfyu07') {
    alert('密碼錯誤！');
    return;
  }
  localStorage.removeItem(LOG_KEY);
  var list = document.getElementById('logList');
  list.innerHTML = '<div class="log-empty" id="logEmpty">尚無紀錄</div>';
}

// ── SPIN ──
document.getElementById('spinBtn').addEventListener('click', doSpin);
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.code === 'Enter' && !spinning) doSpin();
});
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && e.target !== document.getElementById('nameInput') && !spinning) {
    e.preventDefault();
    doSpin();
  }
});

function doSpin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  setHint('轉動中...');
  var winLine = document.getElementById('winLine');
  if (winLine) winLine.classList.remove('lit');

  var syms = SETS[currentSet].symbols;
  var results = [0,1,2].map(function() { return syms[Math.floor(Math.random() * syms.length)]; });
  var name = document.getElementById('nameInput').value.trim();

  function onDone() {
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    setHint('');
    var winLine = document.getElementById('winLine');
    if (winLine) winLine.classList.add('lit');
    addLogEntry(name, currentSet, results);
  }

  if (currentSet === 'dango') {
    runBoxSpin(results, onDone);
  } else if (currentSet === 'fruit') {
    runBasketSpin(results, onDone);
  } else {
    var done = 0;
    var durations = [2200, 2500, 2850];
    reelInners.forEach(function(inner, i) {
      runReelSpin(inner, results[i], durations[i], function() {
        if (++done === 3) onDone();
      });
    });
  }
}

function setHint(msg, ready) {
  var h = document.getElementById('hint');
  h.textContent = msg;
  h.className = 'hint' + (ready ? ' ready' : '');
}

loadLog();
renderStage();
</script>
