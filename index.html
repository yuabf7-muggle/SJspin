<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ SPIN ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #0057D8;
  --blue-dark: #003B8E;
  --blue-light: #4A9FFF;
  --gold: #FFD700;
  --bg: #000B1E;
  --card: #001535;
  --border: rgba(74,159,255,0.22);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--text);
  padding: 20px 16px;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse at 50% 35%, rgba(0,87,216,0.1) 0%, transparent 65%);
  pointer-events:none;
}

.wrap {
  position:relative;
  width: min(400px, 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap: 18px;
}

/* ── HEADER ── */
.header { text-align:center; }
.header-sub { font-size:11px; letter-spacing:.45em; color:var(--blue-light); opacity:.65; }
.header-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:52px; letter-spacing:.1em; line-height:1;
  text-shadow: 0 0 28px rgba(74,159,255,.35);
}
.header-title span { color: var(--gold); }

/* ── SET SELECTOR ── */
.set-selector {
  display:flex; gap:8px; width:100%;
}
.set-btn {
  flex:1;
  padding: 10px 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  cursor: pointer;
  font-family:'Noto Sans TC',sans-serif;
  font-size:12px;
  letter-spacing:.05em;
  transition: all .2s;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
}
.set-btn .set-icon { font-size:22px; }
.set-btn:hover { border-color: rgba(74,159,255,.4); color: rgba(255,255,255,.7); }
.set-btn.active {
  border-color: var(--blue-light);
  background: rgba(74,159,255,.1);
  color: var(--text);
  box-shadow: 0 0 14px rgba(74,159,255,.2);
}

/* ── MAIN CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px 20px;
  width:100%;
  box-shadow: 0 0 40px rgba(0,87,216,.12), inset 0 1px 0 rgba(74,159,255,.12);
  position:relative;
  overflow:hidden;
  min-height: 240px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap: 20px;
}

/* ────────────────────────────────
   SET A: 藍糰子 — BOX SHAKE + POP
──────────────────────────────── */
.stage-box {
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.box-container {
  position:relative;
  width:100px; height:90px;
  display:flex; align-items:flex-end; justify-content:center;
}
.box-img {
  font-size:70px;
  line-height:1;
  transform-origin: bottom center;
  display:block;
  transition: transform .1s;
}
.box-container.shaking .box-img {
  animation: boxShake .08s ease-in-out infinite;
}
@keyframes boxShake {
  0%   { transform: rotate(-6deg) translateX(-3px); }
  25%  { transform: rotate(6deg) translateX(3px); }
  50%  { transform: rotate(-5deg) translateX(-2px); }
  75%  { transform: rotate(5deg) translateX(2px); }
  100% { transform: rotate(0deg); }
}

.pop-items {
  position:absolute;
  top:0; left:50%; transform:translateX(-50%);
  width:200px;
  pointer-events:none;
}
.pop-item {
  width:60px; height:60px;
  opacity:0;
  position:absolute;
  border-radius:8px;
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
}
.pop-item.fly {
  animation: flyOut .55s cubic-bezier(.2,1.4,.4,1) forwards;
}
@keyframes flyOut {
  0%   { opacity:0; transform: translate(0,30px) scale(0.3); }
  60%  { opacity:1; transform: translate(var(--tx), var(--ty)) scale(1.15); }
  100% { opacity:1; transform: translate(var(--tx), var(--ty)) scale(1); }
}

.box-result {
  display:flex; gap:10px; min-height:68px; align-items:center; justify-content:center;
}
.box-result-item {
  width:68px; height:68px;
  background-color:#000A1C;
  border: 1px solid var(--border);
  border-radius:12px;
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0;
  transform: scale(0.5);
  transition: opacity .3s, transform .3s;
}
.box-result-item.show {
  opacity:1; transform:scale(1);
}

/* ────────────────────────────────
   SET B: 水果 — BASKET SWING
──────────────────────────────── */
.stage-basket {
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.basket-wrap {
  position:relative;
  width:120px; height:100px;
  display:flex; align-items:flex-end; justify-content:center;
}
.basket-img {
  font-size:72px;
  line-height:1;
  transform-origin: top center;
  display:block;
}
.basket-wrap.swinging .basket-img {
  animation: basketSwing .35s ease-in-out;
}
@keyframes basketSwing {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-18deg); }
  45%  { transform: rotate(16deg); }
  65%  { transform: rotate(-12deg); }
  80%  { transform: rotate(8deg); }
  100% { transform: rotate(0deg); }
}

.fruit-fall-container {
  position:absolute;
  top:10px; left:50%;
  transform: translateX(-50%);
  width:160px; height:80px;
  pointer-events:none;
}
.fruit-fall {
  position:absolute;
  width:50px; height:50px;
  opacity:0;
  left:50%;
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
}
.fruit-fall.drop {
  animation: fruitDrop .6s cubic-bezier(.4,0,.6,1) forwards;
}
@keyframes fruitDrop {
  0%   { opacity:1; transform: translate(var(--fx), -10px) rotate(0deg); }
  100% { opacity:0; transform: translate(var(--fx), 80px) rotate(var(--fr)); }
}

.basket-result {
  display:flex; gap:10px; min-height:68px; align-items:center; justify-content:center;
}
.basket-result-item {
  width:68px; height:68px;
  background-color:#000A1C;
  border: 1px solid var(--border);
  border-radius:12px;
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0;
  transform: translateY(-12px);
  transition: opacity .3s, transform .35s cubic-bezier(.34,1.56,.64,1);
}
.basket-result-item.show {
  opacity:1; transform:translateY(0);
}

/* ────────────────────────────────
   SET C: 動物 — SLOT REELS
──────────────────────────────── */
.stage-slots {
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}
.slot-machine {
  background:#000510;
  border:2px solid rgba(74,159,255,.2);
  border-radius:14px;
  padding:6px;
  position:relative;
}
.slot-machine::before, .slot-machine::after {
  content:'';
  position:absolute;
  left:6px; right:6px;
  height:40px;
  z-index:3; pointer-events:none;
}
.slot-machine::before { top:6px; background:linear-gradient(to bottom, #000510, transparent); }
.slot-machine::after  { bottom:6px; background:linear-gradient(to top,   #000510, transparent); }

.reels {
  display:flex; gap:6px;
  height:220px; overflow:hidden;
}
.reel {
  width:80px;
  overflow:hidden;
  border-radius:6px;
  position:relative;
}
.reel-inner {
  display:flex; flex-direction:column; align-items:center;
}
.reel-cell {
  width:80px; height:80px;
  flex-shrink:0;
  border-radius:6px;
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
}
.reel-cell.center-win {
  animation: cellGlow .4s ease-in-out infinite alternate;
}
@keyframes cellGlow {
  from { box-shadow: inset 0 0 0 0 rgba(255,215,0,0); }
  to   { box-shadow: inset 0 0 12px 2px rgba(255,215,0,.2); }
}

/* win line */
.win-line {
  position:absolute;
  left:6px; right:6px;
  top:50%; transform:translateY(-50%);
  height:82px;
  border-top:1px dashed rgba(255,215,0,.15);
  border-bottom:1px dashed rgba(255,215,0,.15);
  z-index:2; pointer-events:none;
  transition: border-color .3s;
}
.win-line.lit {
  border-color: rgba(255,215,0,.6);
  background: rgba(255,215,0,.03);
}

/* ── HINT ── */
.hint {
  font-size:12px; color:var(--muted);
  letter-spacing:.04em; text-align:center;
  min-height:18px; transition:color .3s;
}
.hint.ready { color:var(--blue-light); opacity:.9; }

/* ── SPIN BUTTON ── */
.btn-spin {
  width:100%;
  padding:14px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
  border:none; border-radius:12px;
  color:white;
  font-family:'Bebas Neue',sans-serif;
  font-size:20px; letter-spacing:.2em;
  cursor:pointer;
  transition:all .2s;
  box-shadow: 0 4px 18px rgba(0,87,216,.35);
  overflow:hidden; position:relative;
}
.btn-spin::after {
  content:'';
  position:absolute;
  top:0; left:-100%; width:100%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  transition:left .5s;
}
.btn-spin:hover::after { left:100%; }
.btn-spin:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,87,216,.45); }
.btn-spin:disabled { opacity:.4; cursor:not-allowed; transform:none; }

.footer-note {
  font-size:10px; color:var(--muted); opacity:.45;
  letter-spacing:.2em; text-align:center;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-sub">SUPER JUNIOR</div>
    <div class="header-title">SJ <span>SPIN</span></div>
  </div>

  <!-- Set selector -->
  <div class="set-selector">
    <button class="set-btn active" data-set="dango" onclick="switchSet('dango',this)">
      <span class="set-icon">📦</span>
      <span>藍糰子</span>
    </button>
    <button class="set-btn" data-set="fruit" onclick="switchSet('fruit',this)">
      <span class="set-icon">🧺</span>
      <span>水果</span>
    </button>
    <button class="set-btn" data-set="animal" onclick="switchSet('animal',this)">
      <span class="set-icon">🎰</span>
      <span>動物</span>
    </button>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard"></div>

  <button class="btn-spin" id="spinBtn">✦ SPIN ✦</button>
  <div class="hint" id="hint">選一個主題，然後按 SPIN！</div>

  <div class="footer-note">E.L.F forever ✦ 轉到一樣的就得獎！</div>
</div>

<script>
// ── DATA ──
// symbols: '01'~'09'，對應 dango_01.png … animal_09.png
const SETS = {
  dango:  { symbols: ['01','02','03','04','05','06','07','08','09'], prefix: 'dango',  label: '藍糰子' },
  fruit:  { symbols: ['01','02','03','04','05','06','07','08','09'], prefix: 'fruit',  label: '水果'   },
  animal: { symbols: ['01','02','03','04','05','06','07','08','09'], prefix: 'animal', label: '動物'   }
};

let currentSet = 'dango';
let spinning = false;

// ── IMAGE HELPER ──
function imgUrl(set, sym) {
  return `images/${SETS[set].prefix}_${sym}.png`;
}

function applyImg(el, set, sym) {
  el.style.backgroundImage = `url('${imgUrl(set, sym)}')`;
}

// ── SWITCH SET ──
function switchSet(key, btn) {
  if (spinning) return;
  currentSet = key;
  document.querySelectorAll('.set-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStage();
  setHint('點 SPIN 開始！');
}

// ── RENDER STAGE ──
function renderStage() {
  const card = document.getElementById('mainCard');
  if (currentSet === 'dango')       card.innerHTML = buildBoxStage();
  else if (currentSet === 'fruit')  card.innerHTML = buildBasketStage();
  else                              card.innerHTML = buildSlotStage();
  if (currentSet === 'animal') initReels();
}

// ────── STAGE A: BOX ──────
function buildBoxStage() {
  return `
  <div class="stage-box" id="stageBox">
    <div class="box-container" id="boxContainer">
      <span class="box-img">📦</span>
      <div class="pop-items" id="popItems"></div>
    </div>
    <div class="box-result" id="boxResult">
      <div class="box-result-item" id="br0"></div>
      <div class="box-result-item" id="br1"></div>
      <div class="box-result-item" id="br2"></div>
    </div>
  </div>`;
}

function runBoxSpin(results, cb) {
  const box      = document.getElementById('boxContainer');
  const popItems = document.getElementById('popItems');
  const resultEls = [0,1,2].map(i => document.getElementById(`br${i}`));

  resultEls.forEach(el => { el.style.backgroundImage = ''; el.classList.remove('show'); });
  box.classList.add('shaking');
  popItems.innerHTML = '';

  setTimeout(() => {
    box.classList.remove('shaking');

    results.forEach((sym, i) => {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'pop-item';
        const tx = (i - 1) * 65 + 'px';
        el.style.cssText = `--tx:${tx};--ty:-75px;left:calc(50% - 30px);`;
        applyImg(el, currentSet, sym);
        popItems.appendChild(el);
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('fly')));

        setTimeout(() => {
          el.style.opacity = '0';
          applyImg(resultEls[i], currentSet, sym);
          resultEls[i].classList.add('show');
          if (i === results.length - 1) setTimeout(cb, 200);
        }, 500);
      }, i * 200);
    });
  }, 700);
}

// ────── STAGE B: BASKET ──────
function buildBasketStage() {
  return `
  <div class="stage-basket" id="stageBasket">
    <div class="basket-wrap" id="basketWrap">
      <span class="basket-img">🧺</span>
      <div class="fruit-fall-container" id="fruitFall"></div>
    </div>
    <div class="basket-result" id="basketResult">
      <div class="basket-result-item" id="ftr0"></div>
      <div class="basket-result-item" id="ftr1"></div>
      <div class="basket-result-item" id="ftr2"></div>
    </div>
  </div>`;
}

function runBasketSpin(results, cb) {
  const wrap          = document.getElementById('basketWrap');
  const fallContainer = document.getElementById('fruitFall');
  const resultEls     = [0,1,2].map(i => document.getElementById(`ftr${i}`));

  resultEls.forEach(el => { el.style.backgroundImage = ''; el.classList.remove('show'); });
  fallContainer.innerHTML = '';

  wrap.classList.add('swinging');
  setTimeout(() => wrap.classList.remove('swinging'), 400);

  results.forEach((sym, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'fruit-fall';
      const fx = (i - 1) * 50 + 'px';
      const fr = (Math.random() * 40 - 20) + 'deg';
      el.style.cssText = `--fx:${fx};--fr:${fr};`;
      applyImg(el, currentSet, sym);
      fallContainer.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('drop')));

      setTimeout(() => {
        applyImg(resultEls[i], currentSet, sym);
        resultEls[i].classList.add('show');
        if (i === results.length - 1) setTimeout(cb, 200);
      }, 500);
    }, 150 + i * 180);
  });
}

// ────── STAGE C: SLOTS ──────
const REEL_CELL_H = 80;
let reelInners = [];

function buildSlotStage() {
  return `
  <div class="stage-slots">
    <div class="slot-machine">
      <div class="win-line" id="winLine"></div>
      <div class="reels">
        <div class="reel"><div class="reel-inner" id="ri0"></div></div>
        <div class="reel"><div class="reel-inner" id="ri1"></div></div>
        <div class="reel"><div class="reel-inner" id="ri2"></div></div>
      </div>
    </div>
  </div>`;
}

function initReels() {
  const syms = SETS.animal.symbols;
  reelInners = [0,1,2].map(i => {
    const inner = document.getElementById(`ri${i}`);
    const strip = Array.from({length: 24}, () => syms[Math.floor(Math.random() * syms.length)]);
    inner.innerHTML = strip.map(() => `<div class="reel-cell"></div>`).join('');
    const cells = inner.querySelectorAll('.reel-cell');
    strip.forEach((sym, j) => applyImg(cells[j], 'animal', sym));
    inner._strip = strip;
    inner._pos   = 0;
    inner.style.transform = 'translateY(0px)';
    return inner;
  });
}

function runReelSpin(inner, targetSym, duration, cb) {
  const strip      = inner._strip;
  const totalCells = strip.length;
  const landPos    = inner._pos + 14 + Math.floor(Math.random() * 4);

  strip[(landPos + 1) % totalCells] = targetSym;
  const cells = inner.querySelectorAll('.reel-cell');
  cells.forEach((c, i) => applyImg(c, 'animal', strip[i % totalCells]));

  const startPos  = inner._pos;
  const startTime = performance.now();
  const totalDist = (landPos - startPos) * REEL_CELL_H;

  function tick(now) {
    const t     = Math.min((now - startTime) / duration, 1);
    const eased = t < 0.65 ? t / 0.65 : 1 - Math.pow((t - 0.65) / 0.35, 2);
    inner.style.transform = `translateY(${-(startPos * REEL_CELL_H + eased * totalDist)}px)`;

    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      inner._pos = landPos % totalCells;
      inner.style.transform = `translateY(-${inner._pos * REEL_CELL_H}px)`;
      if (cb) cb();
    }
  }
  requestAnimationFrame(tick);
}

// ── SPIN ENTRY ──
document.getElementById('spinBtn').addEventListener('click', doSpin);
document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && !spinning) { e.preventDefault(); doSpin(); }
});

function doSpin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  setHint('轉動中...');
  document.getElementById('winLine')?.classList.remove('lit');

  const syms    = SETS[currentSet].symbols;
  const results = [0,1,2].map(() => syms[Math.floor(Math.random() * syms.length)]);

  function onDone() {
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    setHint('截圖貼到社群，跟你一樣的就得獎！🎉', true);
    document.getElementById('winLine')?.classList.add('lit');
  }

  if (currentSet === 'dango') {
    runBoxSpin(results, onDone);
  } else if (currentSet === 'fruit') {
    runBasketSpin(results, onDone);
  } else {
    let done = 0;
    const durations = [900, 1200, 1550];
    reelInners.forEach((inner, i) => {
      runReelSpin(inner, results[i], durations[i], () => {
        if (++done === 3) onDone();
      });
    });
  }
}

function setHint(msg, ready = false) {
  const h = document.getElementById('hint');
  h.textContent = msg;
  h.className   = 'hint' + (ready ? ' ready' : '');
}

// ── INIT ──
renderStage();
</script>
</body>
</html>
